<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description"
        content="KodNest Intelligence Suite — Job Discovery, AI Resume Builder, and Placement Prep for Indian tech careers.">
    <meta name="theme-color" content="#8B0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>KodNest Intelligence Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div class="layout">
        <!-- Top Bar -->
        <nav class="top-bar" id="app-topbar">
            <div class="top-bar__brand">KodNest</div>
            <div class="top-bar__step" id="app-step"></div>
            <div id="app-badge"></div>
        </nav>

        <!-- Page Header -->
        <header class="page-header" id="app-header">
            <div class="page-header__label">Loading</div>
            <h1 class="page-header__title">Initializing...</h1>
            <p class="page-header__subtitle">Preparing your workspace.</p>
        </header>

        <!-- Content Grid -->
        <main class="content">
            <section id="app-workspace">
                <div class="card" style="padding:60px 20px;text-align:center;">
                    <p style="color:var(--color-text-muted);">Loading modules...</p>
                </div>
            </section>
            <aside id="app-panel"></aside>
        </main>

        <!-- Footer -->
        <footer class="footer" id="app-footer"></footer>
    </div>

    <script src="jobs-data.js"></script>
    <script src="router.js"></script>
</body>

</html>
