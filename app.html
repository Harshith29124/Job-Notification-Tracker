<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Notification Tracker - KodNest Premium</title>
    <meta name="description" content="Track and manage job notifications with calm, intentional design">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&display=swap"

    <link rel="stylesheet" href="app.css">

<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">

            <div class="top-nav__brand">
                <span class="top-nav__brand-text">KodNest</span>
            </div>

            <!-- Desktop Navigation -->
            <div class="top-nav__links">
                <a href="#/" class="top-nav__link" data-route="/">Home</a>

        <div class="top-nav__mobile">
            <a href="#/" class="top-nav__mobile-link" data-route="/">Home</a>

            <a href="#/proof" class="top-nav__mobile-link" data-route="/proof">Proof</a>

    <!-- Main Content Area -->
    <main class="app-main" id="app-content">

    </main>

    <script src="jobs-data.js"></script>
    <script src="router.js"></script>

</html>
